<!DOCTYPE html>
<html>
<head>
    <title>AI Identity Risk Scoring</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #ffffff, #ffd6e8);
            text-align: center;
            padding: 30px;
            color: black;
            transition: 0.4s;
        }

        .pink {
            background: linear-gradient(135deg, #fff0f5, #ffc0cb);
        }

        .blue {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .dark {
            background: #121212;
            color: white;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            border: 2px solid #ffe4ec;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .meter {
            height: 10px;
            background: #ddd;
            border-radius: 10px;
            margin-top: 10px;
        }

        .meter-fill {
            height: 100%;
            border-radius: 10px;
            width: 0%;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f1f3f6;
            margin: 6px 0;
            padding: 8px;
            border-radius: 6px;
        }

        .theme-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
        }
    </style>
</head>

<body>

<div class="theme-buttons">
    <button onclick="setTheme('pink')">🌸 Pink</button>
    <button onclick="setTheme('blue')">🔵 Blue</button>
    <button onclick="setTheme('dark')">🌙 Dark</button>
</div>

<div class="card">
    <h2>🔐 AI Adaptive Access Control</h2>

    <input id="location" placeholder="Location (India / Europe)">
    <input id="device" placeholder="Device (known / unknown)">
    <input id="failed" type="number" placeholder="Failed Attempts">
    <input id="time" placeholder="Login Time (normal / odd)">

    <br><br>
    <button onclick="submitData()">Evaluate Risk</button>

    <div id="result"></div>

    <!-- Risk meter -->
    <div class="meter">
        <div id="meterFill" class="meter-fill"></div>
    </div>

    <h3>📊 Recent Login Activity</h3>
    <ul id="history"></ul>
</div>

<script>
function setTheme(theme) {
    document.body.classList.remove("pink", "blue", "dark");
    document.body.classList.add(theme);
}

function submitData() {
    fetch("/evaluate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            location: document.getElementById("location").value,
            device: document.getElementById("device").value,
            failed_attempts: document.getElementById("failed").value,
            time: document.getElementById("time").value
        })
    })
    .then(res => res.json())
    .then(data => {
        let resultDiv = document.getElementById("result");

        let emoji = data.risk_score > 60 ? "🚨" :
                    data.risk_score > 30 ? "⚠️" : "✅";

        resultDiv.innerHTML =
            emoji + " Risk Score: " + data.risk_score +
            "<br>Decision: " + data.decision;

        resultDiv.style.color = data.color;

        let meter = document.getElementById("meterFill");
        meter.style.width = data.risk_score + "%";
        meter.style.background =
            data.risk_score > 60 ? "red" :
            data.risk_score > 30 ? "orange" : "green";

        let historyList = document.getElementById("history");
        historyList.innerHTML = "";

        data.history.forEach(item => {
            let li = document.createElement("li");

            let color = item.score > 60 ? "red" :
                        item.score > 30 ? "orange" : "green";

            li.innerHTML = `
                <strong>${item.location}</strong> 
                → Score: ${item.score} 
                → <span style="color:${color}">${item.decision}</span>
            `;

            historyList.appendChild(li);
        });
    });
}
</script>

</body>
</html>
